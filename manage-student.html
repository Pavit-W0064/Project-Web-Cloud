<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Manage Students</title>
<link rel="stylesheet" href="admin.css">

<style>

.delete-btn{
    background:#ff4d4f;
    color:white;
    border:none;
    padding:6px 12px;
    border-radius:6px;
    cursor:pointer;
}

.delete-btn:hover{
    background:#d9363e;
}

</style>

</head>

<body>

<div class="layout">

<!-- Sidebar -->
<div class="sidebar">
    <div class="logo"><img src ='KMUTNB_Logo.svg.png' alt="">ระบบหลังบ้าน</div>
    <a href="/dashboard.html">Dashboard</a>
    <a href="/manage-student.html">Manage Students</a>
    <a href="/manage-admin.html">Manage Admin</a>
    <a href="/manage-contact.html">Manage Contact</a>
    <a href="/admin.html">Logout</a>
</div>

<!-- Main -->
<div class="main">

<h2>รายชื่อนักศึกษาที่ลงทะเบียน</h2>

<table class="admin-list">

<thead>
<tr>
<th>ลำดับ</th>
<th>รหัสนักศึกษา</th>
<th>ชื่อ - นามสกุล</th>
<th>รหัสผ่าน</th>
<th>Delete</th>
</tr>
</thead>

<tbody id="studentTableBody"></tbody>

</table>

</div>
</div>

<script src="config.js"></script>

<script>

// ===============================
// LOAD STUDENTS
// ===============================
async function loadStudents(){

    try{

        const res = await fetch(window.apiUrl('/api/getUsers'));
        const data = await res.json();

        console.log("Students:", data);

        const tbody = document.getElementById("studentTableBody");
        tbody.innerHTML = "";

        if(!data.success || data.users.length === 0){

            tbody.innerHTML = `
            <tr>
                <td colspan="5">ยังไม่มีนักศึกษาลงทะเบียน</td>
            </tr>
            `;
            return;
        }

        data.users.forEach((user,index)=>{

            const tr = document.createElement("tr");

            tr.innerHTML = `
                <td>${index+1}</td>
                <td style="font-weight:bold;color:#2f54eb;">
                    ${user.student_id}
                </td>
                <td>${user.username}</td>
                <td>***</td>
                <td>
                    <button class="delete-btn" onclick="deleteStudent(${user.id})">
                        ลบ
                    </button>
                </td>
            `;

            tbody.appendChild(tr);

        });

    }
    catch(err){
        console.error("โหลดข้อมูลล้มเหลว:",err);
    }

}


// ===============================
// DELETE STUDENT
// ===============================
async function deleteStudent(id){

    console.log("Delete ID:",id);

    const confirmDelete = confirm("ต้องการลบข้อมูลนักศึกษาหรือไม่?");
    if(!confirmDelete) return;

    try{

        const res = await fetch(
            window.apiUrl('/api/deleteUser/' + id),
            { method:'DELETE' }
        );

        if(!res.ok){
            alert("Server Error");
            return;
        }

        const data = await res.json();

        console.log("Delete result:",data);

        if(data.success){

            alert("ลบสำเร็จ");

            loadStudents();

        }else{

            alert("ลบไม่สำเร็จ");

        }

    }
    catch(err){

        console.error("Delete Error:",err);
        alert("เกิดข้อผิดพลาด");

    }

}


// ===============================
loadStudents();
// ===============================

</script>

</body>
</html>
