<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="admin.css">
</head>

<body>

<div class="layout">

    <!-- Sidebar -->
    <div class="sidebar">
        <div class="logo"><img src ='KMUTNB_Logo.svg.png' alt="">ระบบหลังบ้าน</div>
        <a href="/dashboard.html">Dashboard</a>
        <a href="/manage-student.html">Manage Students</a>
        <a href="/manage-admin.html">Manage Admin</a>
        <a href="/manage-contact.html">Manage Contact</a>
        <a href="/admin.html">Logout</a>
    </div>
    <div class="main">
        <h2>List of Contact</h2>
        <table class = "admin-list" id="contactTable">
            <tr>
                <th>No.</th>
                <th>Username</th>
                <th>Email</th>
                <th>Subject</th>
                <th>Date</th>
                <th>Detail</th>
                <th>delete</th>
            </tr>
        </table>
    </div>
</div>
<script src="config.js"></script>
<script>
function loadContacts() {
    fetch(window.apiUrl('/api/getBookings'))
        .then(res => res.json())
        .then(data => {

            if (!data.success) return;

            const table = document.getElementById('contactTable');

            table.innerHTML = `
                <tr>
                    <th>No.</th>
                    <th>Username</th>
                    <th>Email</th>
                    <th>Subject</th>
                    <th>Date</th>
                    <th>Detail</th>
                    <th>Delete</th>
                </tr>
            `;

            data.bookings.forEach((item, index) => {

                const row = document.createElement("tr");

                row.innerHTML = `
                    <td>${index + 1}</td>
                    <td>${item.username}</td>
                    <td>${item.email}</td>
                    <td>${item.subject}</td>
                    <td>${item.date}</td>
                    <td>
                        <button class="detailBtn">👁</button>
                    </td>
                    <td>
                        <button class="deleteBtn">🗑️</button>
                    </td>
                `;

                row.querySelector(".detailBtn").addEventListener("click", () => {
                    alert("Message: " + item.message);
                });

                row.querySelector(".deleteBtn").addEventListener("click", () => {
                    deleteContact(item.id);
                });

                table.appendChild(row);
            });

        });
}

function deleteContact(id) {

    if (!confirm("ต้องการลบจริงไหม?")) return;

    fetch(window.apiUrl('/api/cancel-booking'), {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            bookingId: id,
            student_id: "" // admin ลบได้เลย
        })
    })
    .then(res => res.json())
    .then(data => {
        if (data.success) {
            alert("ลบสำเร็จ");
            loadContacts();
        } else {
            alert(data.message || "ลบไม่ได้");
        }
    });
}

loadContacts();
</script>
</body>
</html>
