<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - LibraryBooking</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-color: #4361ee;
            --primary-hover: #304ffe;
            --success-color: #10b981;
            --warning-color: #f59e0b;
            --danger-color: #ef4444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Prompt', sans-serif; }
        
        body { 
            background: url('../assets/images/backimg1.jpg') no-repeat center center/cover;
            background-attachment: fixed;
            min-height: 100vh;
            color: #fff;
            overflow-x: hidden;
        }

        body::before {
            content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom right, rgba(15, 23, 42, 0.9), rgba(15, 23, 42, 0.7));
            z-index: -1;
        }

        /* --- Layout หลัก --- */
        .layout {
            display: flex;
            min-height: 100vh;
            position: relative;
            z-index: 10;
        }

        /* --- Sidebar (Glassmorphism) --- */
        .sidebar {
            width: 260px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            padding: 30px 0;
            box-shadow: 5px 0 30px rgba(0,0,0,0.2);
            animation: slideRight 0.5s ease-out forwards;
        }

        @keyframes slideRight {
            from { transform: translateX(-100%); }
            to { transform: translateX(0); }
        }

        .sidebar .logo {
            text-align: center; margin-bottom: 40px;
            font-size: 1.2rem; font-weight: 600; color: white;
            display: flex; flex-direction: column; align-items: center; gap: 10px;
        }

        .sidebar .logo img {
            width: 120px;
            background: rgba(255,255,255,0.9);
            padding: 10px; border-radius: 10px;
        }

        .sidebar a {
            padding: 15px 30px;
            color: #cbd5e1;
            text-decoration: none;
            font-weight: 500;
            display: flex; align-items: center; gap: 15px;
            transition: all 0.3s ease;
            border-left: 4px solid transparent;
        }

        .sidebar a:hover {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border-left-color: var(--primary-color);
        }

        .sidebar a.active {
            background: linear-gradient(90deg, rgba(67, 97, 238, 0.2) 0%, transparent 100%);
            color: white;
            border-left-color: var(--primary-color);
        }

        .sidebar a.logout {
            margin-top: auto; 
            color: #fca5a5;
        }
        .sidebar a.logout:hover {
            background: rgba(239, 68, 68, 0.2); color: white; border-left-color: var(--danger-color);
        }

        /* --- Main Content --- */
        .container {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
            height: 100vh;
        }

        .page-header { margin-bottom: 30px; animation: fadeInDown 0.8s ease forwards; opacity: 0; }
        .page-header h2 { font-size: 2rem; font-weight: 600; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        .page-header p { color: #94a3b8; }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- Stats Cards (Glassmorphism) --- */
        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 25px;
            margin-bottom: 40px;
        }

        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            transition: transform 0.3s;
            
            opacity: 0; transform: translateY(30px);
            animation: slideUpFade 0.6s cubic-bezier(0.165, 0.84, 0.44, 1) forwards;
        }

        .card:nth-child(1) { animation-delay: 0.1s; }
        .card:nth-child(2) { animation-delay: 0.2s; }
        .card:nth-child(3) { animation-delay: 0.3s; }

        .card:hover { transform: translateY(-10px); background: rgba(255, 255, 255, 0.15); }

        .card h2 { font-size: 3rem; color: #60a5fa; margin-bottom: 5px; text-shadow: 0 2px 10px rgba(96, 165, 250, 0.4); }
        .card p { font-size: 1.1rem; color: #e2e8f0; font-weight: 500; }

        /* --- Graphs (Glassmorphism) --- */
        .showGraph {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 30px;
        }

        .graphBox {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            
            opacity: 0; transform: translateY(30px);
            animation: slideUpFade 0.8s cubic-bezier(0.165, 0.84, 0.44, 1) forwards;
        }

        .graphBox:nth-child(1) { animation-delay: 0.4s; }
        .graphBox:nth-child(2) { animation-delay: 0.5s; }
        .graphBox:nth-child(3) { animation-delay: 0.6s; grid-column: 1 / -1; }

        .graphBox h3 { margin-bottom: 20px; font-weight: 500; color: white; display: flex; align-items: center; gap: 10px;}

        /* CSS สำหรับแก้ปัญหากราฟขยายตัวไม่หยุด */
        .chart-container {
            position: relative;
            height: 300px; /* กำหนดความสูงที่แน่นอนให้กราฟ */
            width: 100%;
        }

        /* ให้กราฟแนวนอนยาวขึ้นนิดนึง */
        .graphBox:nth-child(3) .chart-container {
            height: 350px;
        }

        @keyframes slideUpFade {
            to { opacity: 1; transform: translateY(0); }
        }

    </style>
</head>
<body>

<audio id="uiClickSound" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3" preload="auto"></audio>

<div class="layout">
    <div class="sidebar">
        <div class="logo">
            <img src="../assets/images/KMUTNB_Logo.svg.png" alt="KMUTNB Logo">
            ระบบหลังบ้าน
        </div>
        
        <a href="dashboard.html" class="active click-effect"><i class="fa-solid fa-chart-pie"></i> Dashboard</a>
        <a href="manage-student.html" class="click-effect"><i class="fa-solid fa-users"></i> Manage Students</a>
        <a href="manage-admin.html" class="click-effect"><i class="fa-solid fa-user-shield"></i> Manage Admin</a>
        <a href="manage-Booking.html" class="click-effect"><i class="fa-regular fa-calendar-check"></i> Manage Booking</a>
        <a href="admin_contact.html" class="click-effect"><i class="fa-regular fa-envelope-open"></i> Manage Contact</a>
        
        <a href="admin.html" class="logout click-effect"><i class="fa-solid fa-arrow-right-from-bracket"></i> Logout</a>
    </div>

    <div class="container">
        <div class="page-header">
            <h2>ภาพรวมระบบ (Dashboard)</h2>
            <p>ยินดีต้อนรับสู่แผงควบคุมหลักของ LibraryBooking</p>
        </div>
        
        <div class="cards">
            <div class="card click-effect">
                <h2 id="countBookings">0</h2>
                <p><i class="fa-solid fa-ticket"></i> การจองทั้งหมด</p>
            </div>
            <div class="card click-effect">
                <h2 id="countStudents">0</h2>
                <p><i class="fa-solid fa-user-graduate"></i> นักศึกษาในระบบ</p>
            </div>
            <div class="card click-effect">
                <h2 id="countAdmin">0</h2>
                <p><i class="fa-solid fa-user-tie"></i> จำนวน Admin</p>
            </div>
        </div>

        <div class="showGraph">
            <div class="graphBox">
                <h3><i class="fa-solid fa-chart-line"></i> การจองต่อวัน</h3>
                <div class="chart-container">
                    <canvas id="myChart"></canvas>
                </div>
            </div>

            <div class="graphBox">
                <h3><i class="fa-regular fa-clock"></i> การจองตามช่วงเวลา</h3>
                <div class="chart-container">
                    <canvas id="timeChart"></canvas>
                </div>
            </div>

            <div class="graphBox">
                <h3><i class="fa-solid fa-door-open"></i> การใช้ห้องยอดนิยม</h3>
                <div class="chart-container">
                    <canvas id="popularCategory"></canvas>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="../js/config.js"></script>
<script src="../js/dashboard.js"></script>

<script>
    // --- 1. ระบบเสียงคลิก ---
    const clickSound = document.getElementById('uiClickSound');
    clickSound.volume = 0.3;

    function playClickEffect() {
        clickSound.currentTime = 0; 
        clickSound.play().catch(e => console.log("Audio play blocked"));
    }

    document.addEventListener('DOMContentLoaded', () => {
        // ผูกเสียงเข้ากับปุ่มและเมนูต่างๆ
        const interactiveElements = document.querySelectorAll('.click-effect');
        interactiveElements.forEach(el => {
            el.addEventListener('click', playClickEffect);
        });

        // --- 2. ตั้งค่า Chart.js ให้ตัวหนังสือเป็นสีขาว (เพราะกระจกพื้นหลังสีเข้ม) ---
        Chart.defaults.color = '#cbd5e1'; 
        Chart.defaults.borderColor = 'rgba(255, 255, 255, 0.1)'; 
    });
</script>

</body>
</html>
