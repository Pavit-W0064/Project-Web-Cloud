<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้าสู่ระบบ</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/Project.css">
    <link rel="stylesheet" href="../css/loginadmin.css">
    
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Prompt', sans-serif;
        }

        /* ตั้งค่าพื้นหลังเป็นรูปภาพ เพื่อให้เอฟเฟกต์กระจกทำงานได้สวยงาม */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            /* คุณสามารถเปลี่ยน url รูปให้ตรงกับที่อยู่ไฟล์จริงของคุณได้ */
            background: url('../assets/images/backimg1.jpg') no-repeat center center/cover;
            position: relative;
            overflow: hidden;
        }

        /* แผ่นฟิล์มสีดำโปร่งแสง คลุมทับรูปภาพพื้นหลังอีกที เพื่อให้กล่องกระจกเด่นขึ้น */
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1;
        }

        /* --- เอฟเฟกต์ Liquid Glass (Glassmorphism) --- */
        .login-container {
            position: relative;
            z-index: 2; /* ให้อยู่เหนือพื้นหลังสีดำ */
            
            /* ส่วนสำคัญของ Glassmorphism */
            background: rgba(255, 255, 255, 0.15); /* พื้นหลังสีขาวโปร่งแสง */
            backdrop-filter: blur(15px); /* เบลอพื้นหลังด้านหลังกล่อง */
            -webkit-backdrop-filter: blur(15px); /* สำหรับ Safari */
            border: 1px solid rgba(255, 255, 255, 0.3); /* ขอบกระจกบางๆ */
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3); /* เงากล่องให้ดูลอยขึ้นมา */
            
            border-radius: 20px;
            padding: 40px 35px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            
            /* อนิเมชั่นเด้งขึ้นมาแบบ Pop-up ตอนโหลดหน้าจอ */
            animation: popUp 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            opacity: 0;
            transform: scale(0.8);
        }

        @keyframes popUp {
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .login-container h2 {
            margin-bottom: 25px;
            font-weight: 600;
            color: #ffffff; /* เปลี่ยนเป็นสีขาวให้อ่านง่ายบนพื้นกระจก */
            letter-spacing: 1px;
        }

        /* ปรับแต่งช่อง Input ให้เข้ากับสไตล์กระจก */
        .login-container input {
            width: 100%;
            padding: 14px 15px;
            margin-bottom: 15px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: #ffffff;
            font-size: 0.95rem;
            outline: none;
            transition: all 0.3s;
        }

        .login-container input::placeholder {
            color: rgba(255, 255, 255, 0.7);
        }

        .login-container input:focus {
            background: rgba(255, 255, 255, 0.25);
            border-color: #ffffff;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
        }

        /* ปุ่มล็อกอิน */
        .admin-loginBtn {
            width: 100%;
            padding: 14px;
            background-color: #4361ee;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
            box-shadow: 0 4px 15px rgba(67, 97, 238, 0.3);
        }

        .admin-loginBtn:hover {
            background-color: #304ffe;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(67, 97, 238, 0.5);
        }

        /* ลิงก์ด้านล่าง */
        .links-container {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .links-container a {
            color: rgba(255, 255, 255, 0.85);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.3s;
        }

        .links-container a:hover {
            color: #ffffff;
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <h2>เข้าสู่ระบบนักศึกษา</h2>
        <input type="text" id="log_student_id" placeholder="รหัสนักศึกษา">
        <input type="password" id="log_password" placeholder="รหัสผ่าน">
        
        <button class="admin-loginBtn" id="btnLogin">เข้าสู่ระบบ</button>
        
        <div class="links-container">
            <a href="/pages/register.html">ยังไม่มีบัญชี? สมัครสมาชิก</a>
            <a href="/" style="font-size: 0.85rem; opacity: 0.7;">กลับหน้าหลัก</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="../js/config.js"></script>
    <script>
        document.getElementById('btnLogin').addEventListener('click', async () => {
            const student_id = document.getElementById('log_student_id').value.trim();
            const password = document.getElementById('log_password').value.trim();

            if (!student_id || !password) {
                // ปรับแต่ง SweetAlert ให้เข้ากับธีม
                Swal.fire({ 
                    icon: 'warning', 
                    title: 'แจ้งเตือน',
                    text: 'กรุณากรอกข้อมูลให้ครบถ้วน',
                    confirmButtonColor: '#4361ee'
                });
                return;
            }

            try {
                const res = await fetch(window.apiUrl('/api/login'), {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ student_id, password })
                });
                const data = await res.json();

                if (data.success) {
                    localStorage.setItem('currentUser', JSON.stringify(data.user));
                    window.location.href = '/';
                } else {
                    Swal.fire({ 
                        icon: 'error', 
                        title: 'ล็อกอินล้มเหลว', 
                        text: data.message || 'เข้าสู่ระบบไม่สำเร็จ',
                        confirmButtonColor: '#4361ee'
                    });
                }
            } catch (error) {
                console.error('Login error:', error);
                Swal.fire({ 
                    icon: 'error', 
                    title: 'เชื่อมต่อเซิร์ฟเวอร์ไม่ได้', 
                    text: 'กรุณาตรวจสอบว่า backend ทำงานอยู่',
                    confirmButtonColor: '#4361ee'
                });
            }
        });
    </script>
</body>
</html>
