<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="../css/admin.css">
</head>

<body>

<div class="layout">

    <!-- Sidebar -->
    <div class="sidebar">
        <div class="logo"><img src ='../assets/images/KMUTNB_Logo.svg.png' alt="">ระบบหลังบ้าน</div>
        <a href="dashboard.html">Dashboard</a>
        <a href="manage-student.html">Manage Students</a>
        <a href="manage-admin.html">Manage Admin</a>
        <a href="manage-contact.html">Manage Contact</a>
        <a href="admin.html" class="logout">Logout</a>
    </div>
    <div class="main">
        <h2>List of Contact</h2>

        <input type="text" id="searchContact" placeholder="Search username..." onkeyup="searchContact()">

        <table class = "admin-list" id="contactTable">
            <tr>
                <th>No.</th>
                <th>Username</th>
                <th>Email</th>
                <th>Subject</th>
                <th>Date</th>
                <th>Detail</th>
                <th>Approve</th>
                <th>Reject</th>
                <th>Delete</th>
            </tr>
        </table>
    </div>

    <!-- Detail Modal -->
    <div id="detailModal" class="modal">
        <div class="modal-box">
            <h3>Booking Detail</h3>
            <div id="detailContent"></div>
            <div class="modal-buttons">
                <button onclick="closeDetailModal()">Close</button>
            </div>
        </div>
    </div>
    
</div>
<script src="../js/config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script>
let contactsData = [];

/* =========================
   LOAD CONTACTS
========================= */
function loadContacts() {
    fetch(window.apiUrl('/api/getBookings'))
        .then(res => res.json())
        .then(data => {
            if (!data.success) return;

            contactsData = data.bookings;
            const table = document.getElementById('contactTable');

            table.innerHTML = `
                <tr>
                    <th>No.</th>
                    <th>Username</th>
                    <th>Email</th>
                    <th>Subject</th>
                    <th>Date</th>
                    <th>Detail</th>
                    <th>Approve</th>
                    <th>Reject</th>
                    <th>Delete</th>
                </tr>
            `;

            data.bookings.forEach((item, index) => {
                const row = document.createElement("tr");

                row.innerHTML = `
                    <td>${index + 1}</td>
                    <td>${item.username}</td>
                    <td>${item.email}</td>
                    <td>${item.subject}</td>
                    <td>${item.date}</td>
                    <td>
                        <button onclick="showDetail(${item.id})">👁️</button>
                    </td>
                    <td>
                        <button onclick="approveContact(${item.id})">✅</button>
                    </td>
                    <td>
                        <button onclick="rejectContact(${item.id})">❌</button>
                    </td>
                    <td>
                        <button onclick="deleteContact(${item.id})">🗑️</button>
                    </td>
                `;

                table.appendChild(row);
            });

        });
}

/* =========================
   SHOW DETAIL
========================= */
function showDetail(id) {
    const contact = contactsData.find(c => c.id === id);
    
    if (!contact) {
        Swal.fire('Error', 'ไม่พบข้อมูล', 'error');
        return;
    }

    const detailContent = document.getElementById('detailContent');
    detailContent.innerHTML = `
        <p><b>Username:</b> ${contact.username}</p>
        <p><b>Email:</b> ${contact.email}</p>
        <p><b>Subject:</b> ${contact.subject}</p>
        <p><b>Date:</b> ${contact.date}</p>
        <p><b>Message:</b> ${contact.message}</p>
    `;

    document.getElementById('detailModal').style.display = 'flex';
}

function closeDetailModal() {
    document.getElementById('detailModal').style.display = 'none';
}

/* =========================
   APPROVE CONTACT
========================= */
async function approveContact(id) {
    const confirm = await Swal.fire({
        title: 'Approve Booking?',
        text: 'อนุมัติคำร้องนี้?',
        icon: 'question',
        showCancelButton: true,
        confirmButtonText: 'Approve',
        confirmButtonColor: '#28a745'
    });

    if (!confirm.isConfirmed) return;

    const res = await fetch(window.apiUrl('/api/approveBooking'), {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json'
        },
        body: JSON.stringify({ id })
    });

    const data = await res.json();

    if (data.success) {
        Swal.fire('Success!', 'อนุมัติสำเร็จ', 'success');
        loadContacts();
    } else {
        Swal.fire('Error', data.message || 'อนุมัติไม่สำเร็จ', 'error');
    }
}

/* =========================
   REJECT CONTACT
========================= */
async function rejectContact(id) {
    const confirm = await Swal.fire({
        title: 'Reject Booking?',
        text: 'ไม่อนุมัติคำร้องนี้?',
        icon: 'warning',
        showCancelButton: true,
        confirmButtonText: 'Reject',
        confirmButtonColor: '#ffc107'
    });

    if (!confirm.isConfirmed) return;

    const res = await fetch(window.apiUrl('/api/rejectBooking'), {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json'
        },
        body: JSON.stringify({ id })
    });

    const data = await res.json();

    if (data.success) {
        Swal.fire('Success!', 'ปฏิเสธสำเร็จ', 'success');
        loadContacts();
    } else {
        Swal.fire('Error', data.message || 'ปฏิเสธไม่สำเร็จ', 'error');
    }
}

/* =========================
   DELETE CONTACT
========================= */
async function deleteContact(id) {
    const confirm = await Swal.fire({
        title: 'Delete Contact?',
        text: 'ต้องการลบจริงไหม?',
        icon: 'warning',
        showCancelButton: true,
        confirmButtonText: 'Delete',
        confirmButtonColor: '#d33'
    });

    if (!confirm.isConfirmed) return;

    const res = await fetch(window.apiUrl('/api/cancel-booking'), {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json'
        },
        body: JSON.stringify({
            bookingId: id,
            student_id: ""
        })
    });

    const data = await res.json();

    if (data.success) {
        Swal.fire('Deleted!', 'ลบสำเร็จ', 'success');
        loadContacts();
    } else {
        Swal.fire('Error', data.message || 'ลบไม่ได้', 'error');
    }
}

/* =========================
   SEARCH CONTACT
========================= */
function searchContact() {
    const input = document.getElementById('searchContact').value.toLowerCase();
    const rows = document.querySelectorAll('#contactTable tr');

    rows.forEach((row, index) => {
        if (index === 0) return;
        const username = row.children[1].textContent.toLowerCase();
        row.style.display = username.includes(input) ? '' : 'none';
    });
}

loadContacts();
</script>
</body>
</html>
