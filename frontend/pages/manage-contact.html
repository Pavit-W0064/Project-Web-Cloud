<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="../css/admin.css">
</head>

<body>

<div class="layout">

    <!-- Sidebar -->
    <div class="sidebar">
        <div class="logo"><img src ='../assets/images/KMUTNB_Logo.svg.png' alt="">ระบบหลังบ้าน</div>
        <a href="dashboard.html">Dashboard</a>
        <a href="manage-student.html">Manage Students</a>
        <a href="manage-admin.html">Manage Admin</a>
        <a href="manage-contact.html">Manage Contact</a>
        <a href="admin.html" class="logout">Logout</a>
    </div>
    <div class="main">
        <h2>List of Contact</h2>
        <table class = "admin-list" id="contactTable">
            <tr>
                <th>No.</th>
                <th>Username</th>
                <th>Email</th>
                <th>Subject</th>
                <th>Date</th>
                <th>Detail</th>
                <th>Approve</th>
                <th>Reject</th>
                <th>delete</th>
            </tr>
        </table>
    </div>
</div>
<script src="../js/config.js"></script>
<script>
function loadContacts() {
    fetch(window.apiUrl('/api/getBookings'))
        .then(res => res.json())
        .then(data => {

            if (!data.success) return;

            const table = document.getElementById('contactTable');

            table.innerHTML = `
                <tr>
                    <th>No.</th>
                    <th>Username</th>
                    <th>Email</th>
                    <th>Subject</th>
                    <th>Date</th>
                    <th>Detail</th>
                    <th>Approve</th>
                    <th>Reject</th>
                    <th>Delete</th>
                </tr>
            `;

            data.bookings.forEach((item, index) => {

                const row = document.createElement("tr");

                row.innerHTML = `
                    <td>${index + 1}</td>
                    <td>${item.username}</td>
                    <td>${item.email}</td>
                    <td>${item.subject}</td>
                    <td>${item.date}</td>
                    <td>
                        <button class="detailBtn">👁</button>
                    </td>
                    <td>
                        <button class="approveBtn">✅</button>
                    </td>

                    <td>
                        <button class="rejectBtn">❌</button>
                    </td>

                    <td>
                        <button class="deleteBtn">🗑️</button>
                    </td>
                `;

                row.querySelector(".detailBtn").addEventListener("click", () => {
                    alert("Message: " + item.message);
                });

                row.querySelector(".approveBtn").addEventListener("click",()=>{
                approveContact(item.id);
                });

                row.querySelector(".rejectBtn").addEventListener("click",()=>{
                rejectContact(item.id);
                });    

                row.querySelector(".deleteBtn").addEventListener("click", () => {
                    deleteContact(item.id);
                });

                table.appendChild(row);
            });

        });
}

function deleteContact(id) {

    if (!confirm("ต้องการลบจริงไหม?")) return;

    fetch(window.apiUrl('/api/cancel-booking'), {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            bookingId: id,
            student_id: "" // admin ลบได้เลย
        })
    })
    .then(res => res.json())
    .then(data => {
        if (data.success) {
            alert("ลบสำเร็จ");
            loadContacts();
        } else {
            alert(data.message || "ลบไม่ได้");
        }
    });
}

// =========================
// APPROVE
// =========================
function approveContact(id){

if(!confirm("อนุมัติคำร้องนี้?")) return;

fetch(window.apiUrl('/api/approveBooking'),{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({ id })
})
.then(res=>res.json())
.then(data=>{

if(data.success){

alert("อนุมัติสำเร็จ");
loadContacts();

}else{

alert("อนุมัติไม่สำเร็จ");

}

});

}

// =========================
// REJECT
// =========================
function rejectContact(id){

if(!confirm("ไม่อนุมัติคำร้องนี้?")) return;

fetch(window.apiUrl('/api/rejectBooking'),{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({ id })
})
.then(res=>res.json())
.then(data=>{

if(data.success){

alert("ปฏิเสธสำเร็จ");
loadContacts();

}else{

alert("ปฏิเสธไม่สำเร็จ");

}

});

}


loadContacts();
</script>
</body>
</html>
