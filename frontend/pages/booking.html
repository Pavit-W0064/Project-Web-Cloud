<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบจองห้องสมุด</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-color: #4361ee;
            --primary-hover: #304ffe;
            --danger-color: #ef4444;
            --text-dark: #333333;
        }

        * {
            box-sizing: border-box;
            font-family: 'Prompt', sans-serif;
            margin: 0; padding: 0;
        }

        /* --- ภาพพื้นหลัง (ใช้ภาพห้องสมุดให้เข้ากับธีม) --- */
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: url('../assets/images/backimg1.jpg') no-repeat center center/cover;
            position: relative;
            overflow-x: hidden;
        }

        /* แผ่นฟิล์มสีดำโปร่งแสง คลุมทับรูปภาพพื้นหลัง */
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6); /* เข้มขึ้นนิดนึงให้กล่องฟอร์มเด่น */
            z-index: 1;
        }

        /* --- Navbar แบบกระจกใส (จากหน้า Home) --- */
        .navbar { 
            width: 100%;
            position: absolute;
            top: 0; left: 0;
            background-color: rgba(15, 23, 42, 0.3); 
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 15px 5%; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.2);
            z-index: 100;
            animation: slideDownFade 0.8s ease-out forwards;
        }

        @keyframes slideDownFade {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo {
            font-size: 1.6rem;
            font-weight: 700;
            color: white;
            letter-spacing: 0.5px;
            text-shadow: 0 2px 5px rgba(0,0,0,0.5);
            text-decoration: none;
        }

        .btn-nav {
            padding: 8px 20px;
            border-radius: 50px;
            font-weight: 500;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
        
        .btn-glass-outline {
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.6);
            background: rgba(255, 255, 255, 0.1);
            text-shadow: 0 1px 2px rgba(0,0,0,0.5);
        }
        .btn-glass-outline:hover {
            background: white;
            color: var(--text-dark);
            text-shadow: none;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.5);
        }

        .btn-glass-danger {
            color: white;
            border: 1px solid rgba(239, 68, 68, 0.6);
            background: rgba(239, 68, 68, 0.2);
        }
        .btn-glass-danger:hover {
            background: var(--danger-color);
            box-shadow: 0 0 15px rgba(239, 68, 68, 0.5);
        }


        /* --- กล่องจองห้อง (Liquid Glass) --- */
        .booking-wrapper {
            position: relative;
            z-index: 2; /* ให้อยู่เหนือฟิล์มดำ */
            width: 100%;
            display: flex;
            justify-content: center;
            margin-top: 80px; /* เว้นที่ให้ Navbar */
            padding: 20px;
        }

        .booking-container {
            background: rgba(255, 255, 255, 0.15); 
            backdrop-filter: blur(15px); 
            -webkit-backdrop-filter: blur(15px); 
            border: 1px solid rgba(255, 255, 255, 0.3); 
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3); 
            border-radius: 20px;
            padding: 40px 35px;
            width: 100%;
            max-width: 480px;
            text-align: center;
            
            /* อนิเมชั่น Pop-up */
            animation: popUp 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            opacity: 0;
            transform: scale(0.8);
        }

        @keyframes popUp {
            to { opacity: 1; transform: scale(1); }
        }

        .booking-container h2 {
            margin-bottom: 25px;
            font-weight: 600;
            color: #ffffff;
            letter-spacing: 1px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        /* --- ฟอร์ม Input (สไตล์กระจก) --- */
        .input-group {
            position: relative;
            margin-bottom: 15px;
        }

        .input-group i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.7);
            font-size: 1rem;
            pointer-events: none; /* ไม่ให้ไอคอนขวางการคลิก input */
            transition: color 0.3s;
        }

        .booking-container input, 
        .booking-container select {
            width: 100%;
            padding: 14px 15px 14px 45px; /* เผื่อที่ให้ไอคอน */
            border: 1px solid rgba(255, 255, 255, 0.4);
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: #ffffff;
            font-size: 0.95rem;
            outline: none;
            transition: all 0.3s;
            appearance: none; /* ซ่อนลูกศร select ดั้งเดิมในบางเบราว์เซอร์ */
        }

        /* จัดการสี placeholder */
        .booking-container input::placeholder,
        .booking-container select:invalid {
            color: rgba(255, 255, 255, 0.6);
        }

        /* เปลี่ยนสีพื้นหลัง dropdown option ให้สีเข้มเพื่อให้อ่านง่ายตอนกดเลือก */
        .booking-container select option {
            background-color: #1e293b;
            color: white;
        }

        .booking-container input:focus,
        .booking-container select:focus {
            background: rgba(255, 255, 255, 0.25);
            border-color: #ffffff;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
        }

        .booking-container input:focus + i,
        .booking-container select:focus + i {
            color: #ffffff;
        }

        /* กรณี input ถูก disabled (ล็อคข้อมูลผู้ใช้) */
        .booking-container input:disabled {
            background: rgba(255, 255, 255, 0.05);
            color: rgba(255, 255, 255, 0.5);
            border-color: rgba(255, 255, 255, 0.1);
            cursor: not-allowed;
        }

        /* --- ปุ่มกด --- */
        .btn-submit {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--primary-color) 0%, #6366f1 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.05rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 15px;
            box-shadow: 0 4px 15px rgba(67, 97, 238, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(67, 97, 238, 0.5);
        }

        /* สำหรับลูกศร Select ที่ทำเอง */
        .select-wrapper {
            position: relative;
        }
        .select-wrapper::after {
            content: '\f078';
            font-family: 'Font Awesome 6 Free';
            font-weight: 900;
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255,255,255,0.7);
            pointer-events: none;
        }

        /* ไอคอนปฏิทินของ input type="date" */
        input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(1);
            cursor: pointer;
        }

    </style>
</head>
<body>

    <audio id="uiClickSound" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3" preload="auto"></audio>

    <nav class="navbar">
        <a href="../index.html" class="logo">LibraryBooking</a>
        <div style="display: flex; gap: 15px;">
            <a href="../index.html" class="btn-nav btn-glass-outline click-effect"><i class="fa-solid fa-house"></i> หน้าหลัก</a>
            <button id="btnLogout" class="btn-nav btn-glass-danger click-effect"><i class="fa-solid fa-arrow-right-from-bracket"></i> ออกจากระบบ</button>
        </div>
    </nav>

    <div class="booking-wrapper">
        <div class="booking-container">
            <h2><i class="fa-regular fa-calendar-check"></i> จองห้องสมุด</h2>
            
            <div class="input-group">
                <input type="text" id="b_name" placeholder="ชื่อ-นามสกุล">
                <i class="fa-regular fa-user"></i>
            </div>
            
            <div class="input-group">
                <input type="text" id="b_student_id" placeholder="รหัสนักศึกษา">
                <i class="fa-solid fa-id-badge"></i>
            </div>
            
            <div class="input-group select-wrapper">
                <select id="b_room" required>
                    <option value="" disabled selected hidden>-- เลือกห้องอ่านหนังสือ --</option>
                    <option value="Study Room 1 (4 ที่นั่ง)">Study Room 1 (4 ที่นั่ง)</option>
                    <option value="Study Room 2 (4 ที่นั่ง)">Study Room 2 (4 ที่นั่ง)</option>
                    <option value="Meeting Room A (8 ที่นั่ง)">Meeting Room A (8 ที่นั่ง)</option>
                    <option value="Meeting Room B (8 ที่นั่ง)">Meeting Room B (8 ที่นั่ง)</option>
                </select>
                <i class="fa-solid fa-door-open"></i>
            </div>

            <div class="input-group">
                <input type="date" id="b_date" required>
                <i class="fa-regular fa-calendar"></i>
            </div>
            
            <div class="input-group select-wrapper">
                <select id="b_timeSlot" required>
                    <option value="" disabled selected hidden>-- เลือกช่วงเวลา --</option>
                    <option value="09:00 - 11:00">09:00 - 11:00</option>
                    <option value="11:00 - 13:00">11:00 - 13:00</option>
                    <option value="13:00 - 15:00">13:00 - 15:00</option>
                    <option value="15:00 - 17:00">15:00 - 17:00</option>
                </select>
                <i class="fa-regular fa-clock"></i>
            </div>
            
            <button class="btn-submit click-effect" id="submitBooking"><i class="fa-solid fa-check"></i> ยืนยันการจอง</button>
        </div>
    </div>

    <script src="../js/config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        // --- 1. ระบบเสียง ---
        const clickSound = document.getElementById('uiClickSound');
        clickSound.volume = 0.3;

        function playClickEffect() {
            clickSound.currentTime = 0; 
            clickSound.play().catch(e => console.log("Audio play blocked"));
        }

        document.addEventListener('DOMContentLoaded', () => {
            document.querySelectorAll('.click-effect').forEach(el => {
                el.addEventListener('click', playClickEffect);
            });
        });

        // --- 2. การจัดการข้อมูลผู้ใช้ ---
        const loggedInUser = JSON.parse(localStorage.getItem('currentUser'));

        if (!loggedInUser) {
            Swal.fire({
                icon: 'warning',
                title: 'ยังไม่ได้เข้าสู่ระบบ',
                text: 'กรุณาเข้าสู่ระบบก่อนทำการจองห้องสมุดครับ',
                confirmButtonColor: '#4361ee'
            }).then(() => {
                window.location.href = 'user-login.html';
            });
        } else {
            document.getElementById('b_name').value = loggedInUser.name;
            document.getElementById('b_student_id').value = loggedInUser.student_id;
            
            document.getElementById('b_name').disabled = true;
            document.getElementById('b_student_id').disabled = true;
        }

        // --- 3. จำกัดวันที่ (จองล่วงหน้าได้ 7 วัน) ---
        const today = new Date();
        const maxDate = new Date(today.getTime() + 7 * 24 * 60 * 60 * 1000);
        
        // ปรับ Format วันที่ให้รองรับ Timezone ไทย (ป้องกันบัคข้ามวัน)
        const todayStr = new Date(today.getTime() - (today.getTimezoneOffset() * 60000)).toISOString().split("T")[0];
        const maxDateStr = new Date(maxDate.getTime() - (maxDate.getTimezoneOffset() * 60000)).toISOString().split("T")[0];

        document.getElementById('b_date').min = todayStr;
        document.getElementById('b_date').max = maxDateStr;

        // --- 4. โลจิกการจองห้อง ---
        document.getElementById('submitBooking').addEventListener('click', async () => {
            playClickEffect();

            const name = document.getElementById('b_name').value;
            const student_id = document.getElementById('b_student_id').value;
            const room = document.getElementById('b_room').value;
            const date = document.getElementById('b_date').value;
            const timeSlot = document.getElementById('b_timeSlot').value;

            if(!room || !date || !timeSlot) {
                Swal.fire({ icon: 'warning', title: 'ข้อมูลไม่ครบ', text: 'กรุณาเลือกห้อง วันที่ และช่วงเวลาให้ครบถ้วน', confirmButtonColor: '#f59e0b' });
                return;
            }

            // แสดง Loading
            Swal.fire({ title: 'กำลังประมวลผล...', allowOutsideClick: false, didOpen: () => { Swal.showLoading(); } });

            const payload = { name, student_id, room, date, timeSlot };

            try {
                let apiEndpoint = 'http://localhost:3000/api/book-room';
                if (typeof window.apiUrl === 'function') apiEndpoint = window.apiUrl('/api/book-room');

                const res = await fetch(apiEndpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await res.json();

                if(data.success) {
                    Swal.fire({
                        icon: 'success',
                        title: 'จองห้องสำเร็จ!',
                        html: `ระบบได้รับคิวจองของคุณแล้ว<br><b>${data.booking ? data.booking.room : room}</b><br>เวลา: ${data.booking ? data.booking.timeSlot : timeSlot}`,
                        confirmButtonText: 'ดูตารางการจอง',
                        confirmButtonColor: '#10b981'
                    }).then(() => {
                        window.location.href = 'queue.html';
                    });
                } else {
                    Swal.fire({ icon: 'error', title: 'จองไม่สำเร็จ', text: data.message, confirmButtonColor: '#ef4444' });
                }
            } catch(err) {
                Swal.fire({ icon: 'error', title: 'เกิดข้อผิดพลาดกับเซิร์ฟเวอร์', text: 'ไม่สามารถส่งข้อมูลการจองได้', confirmButtonColor: '#ef4444' });
            }
        });

        // --- 5. ระบบออกจากระบบ (Logout) ---
        document.getElementById('btnLogout').addEventListener('click', () => {
            Swal.fire({
                title: 'ต้องการออกจากระบบ?',
                icon: 'question',
                showCancelButton: true,
                confirmButtonColor: '#ef4444',
                cancelButtonColor: '#64748b',
                confirmButtonText: 'ใช่, ออกจากระบบ',
                cancelButtonText: 'ยกเลิก'
            }).then((result) => {
                if (result.isConfirmed) {
                    localStorage.removeItem('currentUser');
                    
                    Swal.fire({
                        icon: 'success',
                        title: 'ออกจากระบบสำเร็จ',
                        timer: 1500,
                        showConfirmButton: false
                    }).then(() => {
                        window.location.href = '../index.html';
                    });
                }
            });
        });

    </script>
</body>
</html>
