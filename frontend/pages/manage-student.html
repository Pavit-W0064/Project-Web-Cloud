<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Manage Students</title>
<link rel="stylesheet" href="../css/admin.css">

<style>

.delete-btn{
    background:#d4a574;
    color:white;
    border:none;
    padding:8px 16px;
    border-radius:6px;
    cursor:pointer;
    font-weight:500;
    transition: all 0.3s ease;
}

.delete-btn:hover{
    background:#c4935a;
    transform: scale(1.05);
}

/* Delete Modal */
.modal {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.5);
    z-index: 1000;
    justify-content: center;
    align-items: center;
}

.modal.show {
    display: flex;
}

.modal-content {
    background: white;
    padding: 40px;
    border-radius: 12px;
    text-align: center;
    min-width: 400px;
    box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
    animation: modalSlideIn 0.3s ease-out;
}

@keyframes modalSlideIn {
    from {
        transform: translateY(-30px);
        opacity: 0;
    }
    to {
        transform: translateY(0);
        opacity: 1;
    }
}

.modal-content h3 {
    margin: 0 0 15px 0;
    font-size: 18px;
    color: #333;
    font-weight: 600;
}

.modal-content p {
    margin: 0 0 30px 0;
    font-size: 16px;
    color: #666;
    line-height: 1.5;
}

.modal-buttons {
    display: flex;
    gap: 15px;
    justify-content: center;
}

.modal-btn {
    padding: 10px 30px;
    border: none;
    border-radius: 6px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
}

.modal-btn-confirm {
    background: #c53f3f;
    color: white;
    border: 2px solid #c53f3f;
}

.modal-btn-confirm:hover {
    background: #a73232;
    border-color: #a73232;
    transform: scale(1.05);
}

.modal-btn-cancel {
    background: white;
    color: #333;
    border: 2px solid #d9d9d9;
}

.modal-btn-cancel:hover {
    border-color: #999;
    background: #f5f5f5;
}

</style>

</head>

<body>

<div class="layout">

<!-- Sidebar -->
<div class="sidebar">
    <div class="logo"><img src ='../assets/images/KMUTNB_Logo.svg.png' alt="">ระบบหลังบ้าน</div>
    <a href="dashboard.html">Dashboard</a>
    <a href="manage-student.html">Manage Students</a>
    <a href="manage-admin.html">Manage Admin</a>
    <a href="manage-contact.html">Manage Contact</a>
    <a href="admin.html" class="logout">Logout</a>
</div>

<!-- Main -->
<div class="main">

<h2>รายชื่อนักศึกษาที่ลงทะเบียน</h2>

<table class="admin-list">

<thead>
<tr>
<th>No.</th>
<th>Student id</th>
<th>Username</th>
<th>Password</th>
<th>Delete</th>
</tr>
</thead>

<tbody id="studentTableBody"></tbody>

</table>

</div>
</div>

<!-- Delete Modal -->
<div id="deleteModal" class="modal">
    <div class="modal-content">
        <h3>Delete Student/h3>
        <p id="deleteMessage">ต้องการยืนยันการลบข้อมูล?</p>
        <div class="modal-buttons">
            <button class="modal-btn modal-btn-confirm" onclick="confirmDelete()">OK</button>
            <button class="modal-btn modal-btn-cancel" onclick="cancelDelete()">Cancel</button>
        </div>
    </div>
</div>

<script src="../js/config.js"></script>

<script>

// ===============================
// LOAD STUDENTS
// ===============================
async function loadStudents(){

    try{

        const res = await fetch(window.apiUrl('/api/getUsers'));
        const data = await res.json();

        console.log("Students:", data);

        const tbody = document.getElementById("studentTableBody");
        tbody.innerHTML = "";

        if(!data.success || data.users.length === 0){

            tbody.innerHTML = `
            <tr>
                <td colspan="5">ยังไม่มีนักศึกษาลงทะเบียน</td>
            </tr>
            `;
            return;
        }

        data.users.forEach((user,index)=>{

            const tr = document.createElement("tr");

            tr.innerHTML = `
                <td>${index+1}</td>
                <td style="font-weight:bold;color:#2f54eb;">
                    ${user.student_id}
                </td>
                <td>${user.username}</td>
                <td>***</td>
                <td>
                    <button class="delete-btn" onclick="showDeleteModal(${user.id})">
                        ลบ
                    </button>
                </td>
            `;

            tbody.appendChild(tr);

        });

    }
    catch(err){
        console.error("โหลดข้อมูลล้มเหลว:",err);
    }

}


// ===============================
// DELETE STUDENT
// ===============================
let deleteUserId = null;

function showDeleteModal(id) {
    deleteUserId = id;
    document.getElementById('deleteModal').classList.add('show');
}

function cancelDelete() {
    deleteUserId = null;
    document.getElementById('deleteModal').classList.remove('show');
}

async function confirmDelete(){

    if(!deleteUserId) return;

    const id = deleteUserId;
    cancelDelete();

    try{

        const res = await fetch(
            window.apiUrl('/api/deleteUser/' + id),
            { method:'DELETE' }
        );

        if(!res.ok){
            alert("Server Error");
            return;
        }

        const data = await res.json();

        console.log("Delete result:",data);

        if(data.success){

            alert("ลบสำเร็จ");

            loadStudents();

        }else{

            alert("ลบไม่สำเร็จ");

        }

    }
    catch(err){

        console.error("Delete Error:",err);
        alert("เกิดข้อผิดพลาด");

    }

}


// ===============================
loadStudents();
// ===============================

// Close modal when clicking outside
document.getElementById('deleteModal').addEventListener('click', function(e) {
    if(e.target === this) {
        cancelDelete();
    }
});

</script>

</body>
</html>
