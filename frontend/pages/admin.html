<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - LibraryBooking</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-color: #4361ee;
            --primary-hover: #304ffe;
            --danger-color: #ff4757;
            --text-dark: #333333;
        }

        * { 
            margin: 0; padding: 0; box-sizing: border-box; 
            font-family: 'Prompt', sans-serif; 
        }
        
        body { 
            /* เปลี่ยนพื้นหลังน้ำเงินสดเป็นภาพบรรยากาศห้องสมุดแบบ User Login แต่ดูสงบและเป็นระเบียบกว่า */
            background: url('../assets/images/backimg1.jpg') no-repeat center center/cover;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* แผ่นฟิล์มดำทับภาพพื้นหลังให้ input อ่านง่าย */
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1;
        }

        .wrapper {
            position: relative;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
        }

        /* ===== เอฟเฟกต์ Liquid Glass ใบเดียว Unified (พิเศษกว่า Admin/User) ===== */
        .glass-panel {
            background: rgba(255, 255, 255, 0.15); 
            backdrop-filter: blur(15px); 
            -webkit-backdrop-filter: blur(15px); 
            border: 1px solid rgba(255, 255, 255, 0.3); 
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3); 
            border-radius: 20px;
            padding: 50px;
            width: 90%;
            max-width: 450px;
            text-align: center;
            
            /* --- Point 1: Smooth Entrance Animation --- */
            animation: slideInUpSmooth 0.8s cubic-bezier(0.165, 0.84, 0.44, 1) forwards;
            opacity: 0;
            transform: translateY(30px);
        }

        @keyframes slideInUpSmooth {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ย้าย User Icon มาไว้ด้านบนสุดภายในกล่องกระจก */
        .glass-panel .image-icon {
            width: 100px;
            height: 100px;
            margin: 0 auto 30px;
            border-radius: 50%;
            background: linear-gradient(135deg, #12c2e9 0%, #c471ed 50%, #f64f59 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            position: relative;
        }

        .glass-panel .image-icon i {
            font-size: 3rem;
            color: white;
            opacity: 0.9;
        }

        .glass-panel h2 {
            margin-bottom: 30px;
            font-weight: 600;
            color: #ffffff; 
            letter-spacing: 1px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }

        /* ===== ปรับปรุง Input ให้พิเศษและ smooth ขึ้น ===== */
        .input-group {
            position: relative;
            margin-bottom: 20px;
        }

        .input-group i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.7);
            font-size: 1.1rem;
            transition: color 0.3s;
        }

        .input-group input {
            width: 100%;
            padding: 14px 15px 14px 45px; /* เผื่อที่ให้ไอคอนฝั่งซ้าย */
            border: 1px solid rgba(255, 255, 255, 0.4);
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: #ffffff;
            font-size: 0.95rem;
            outline: none;
            transition: all 0.3s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        .input-group input::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

        /* เอฟเฟกต์ตอนโฟกัส ให้ดูพรีเมียม */
        .input-group input:focus {
            background: rgba(255, 255, 255, 0.25);
            border-color: #ffffff;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
        }

        .input-group input:focus + i {
            color: #ffffff;
        }

        /* ===== ปรับปรุงปุ่มให้สมูทและคุมโทน ===== */
        .admin-loginBtn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--primary-color) 0%, #6366f1 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.165, 0.84, 0.44, 1);
            margin-top: 10px;
            box-shadow: 0 4px 15px rgba(67, 97, 238, 0.3);
        }

        .admin-loginBtn:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 8px 25px rgba(67, 97, 238, 0.5);
        }

        /* ปรับปรุงปุ่มกลับให้ดูพรีเมียมกว่าปุ่มส้มเดิม */
        .goBack {
            width: 100%;
            padding: 12px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 10px;
            font-size: 0.9rem;
            font-weight: 400;
            cursor: pointer;
            margin-top: 15px;
            transition: all 0.3s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        .goBack:hover {
            background: rgba(255, 255, 255, 0.25);
            border-color: #ffffff;
            transform: translateY(-1px);
        }

    </style>
</head>
<body>

    <audio id="clickSound" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3" preload="auto"></audio>
    <audio id="typeSound" src="https://assets.mixkit.co/active_storage/sfx/2324/2324-preview.mp3" preload="auto"></audio>

<div class="wrapper">
    <div class="glass-panel">
        
        <div class="image-icon">
            <i class="fa-solid fa-user-gear"></i> </div>

        <h2>Admin Login</h2>
        
        <div class="input-group">
            <i class="fa-solid fa-user"></i>
            <input type="text" placeholder="Enter your name or email" id="login_page_admin_email" class="type-sound">
        </div>

        <div class="input-group">
            <i class="fa-solid fa-lock"></i>
            <input type="password" placeholder="Enter your password" id="login_page_admin_pwd" class="type-sound">
        </div>
    
        <button class="admin-loginBtn click-sound"><i class="fa-solid fa-right-to-bracket"></i> Login</button>
        <button class="goBack click-sound" onclick="window.location.href='../index.html'"><i class="fa-solid fa-arrow-left"></i> Go back</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="../js/config.js"></script>
<script src="../js/admin.js"></script>

<script>
    const clickSound = document.getElementById('clickSound');

    // ปรับระดับเสียงให้ละมุนๆ ไม่ดังเกินไป
    clickSound.volume = 0.2; 

    function playClickSound() {
        clickSound.currentTime = 0; // เล่นใหม่ทันที
        clickSound.play().catch(e => console.log("Audio play blocked"));
    }

    document.addEventListener('DOMContentLoaded', () => {
        // ผูกเสียงคลิกกับปุ่ม
        const clickables = document.querySelectorAll('.click-sound');
        clickables.forEach(btn => {
            btn.addEventListener('click', playClickSound);
        });

    });
</script>
</body>
</html>
