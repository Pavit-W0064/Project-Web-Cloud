<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script>
    document.addEventListener("DOMContentLoaded", () => {
        // ดึงข้อมูลการล็อกอินจากเบราว์เซอร์
        const currentUserStr = localStorage.getItem('currentUser');
        
        const navAuthSection = document.getElementById('nav-auth-section');
        const heroBookBtn = document.getElementById('hero-book-btn');

        if (currentUserStr) {
            // ถ้ามีคนล็อกอินอยู่ (แปลงข้อมูลจากตัวหนังสือเป็น Object)
            const currentUser = JSON.parse(currentUserStr);
            
            // 1. เปลี่ยน Navbar มุมขวาบน ให้โชว์ชื่อ และปุ่มออกจากระบบ
            navAuthSection.innerHTML = `
                <span style="font-weight: bold; color: #333; font-size: 16px;">สวัสดี, ${currentUser.name}</span>
                <button id="main-logout-btn" class="btn-nav" style="background: #ef4444; border: none; cursor: pointer; color: white;">ออกจากระบบ</button>
            `;

                // 2. ปุ่ม "จองห้อง" ให้ไปหน้าจอง
                heroBookBtn.href = "/booking.html";
                heroBookBtn.addEventListener('click', () => {
                    window.location.href = '/booking.html';
                });

                // 3. ทำให้ปุ่มออกจากระบบใช้งานได้จริง
                document.getElementById('main-logout-btn').addEventListener('click', () => {
                    Swal.fire({
                        title: 'ต้องการออกจากระบบ?',
                        icon: 'warning',
                        showCancelButton: true,
                        confirmButtonColor: '#ef4444',
                        cancelButtonColor: '#6c757d',
                        confirmButtonText: 'ออกจากระบบ',
                        cancelButtonText: 'ยกเลิก'
                    }).then((result) => {
                        if (result.isConfirmed) {
                            // ล้างข้อมูลผู้ใช้ออก
                            localStorage.removeItem('currentUser');
                            
                            // รีเฟรชหน้าเว็บ 1 รอบ เพื่อให้ปุ่มกลับไปเป็นแบบเดิม
                            window.location.reload(); 
                        }
                    });
                });
            } else {
                // ถ้าไม่ login ให้ปุ่มไปหน้า login
                heroBookBtn.href = "/user-login.html";
                heroBookBtn.addEventListener('click', () => {
                    window.location.href = '/user-login.html';
