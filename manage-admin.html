<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="admin.css">
</head>

<body>

<div class="layout">

    <!-- Sidebar -->
    <div class="sidebar">
        <div class="logo">ระบบหลังบ้าน</div>
        <a href="/dashboard.html">Dashboard</a>
        <a href="/manage-student.html">Manage Students</a>
        <a href="/manage-admin.html">Manage Admin</a>
        <a href="/manage-contact.html">Manage Contact</a>
        <a href="/admin.html">Logout</a>
    </div>
    <div class="main">
        <h2>List of Administrators</h2>
        <input type="text" id="searchAdmin" placeholder="Search username..." onkeyup="searchAdmin()">
        <button class="btn-add" onclick="addAdmin()">➕ Add Admin</button>
        

        <table class="admin-list" id="adminTable">
            <tr>
                <th>No.</th>
                <th>Username</th>
                <th>email</th>
                <th>password</th>
                <th>edit</th>
                <th>delete</th>
            </tr>
        </table>
    </div>
        <div id='editModal' class='modal'>
            <div class="modal-box">
                <h3>Edit Admin</h3>

                <label>Username</label>
                <input type='text' id='editUsername'>

                <label>Email</label>
                <input type="text" id='editEmail'>

                <label>Password</label>
                <input type="text" id="editPassword">

                <div class="modal-buttons">
                    <button onclick="closeModal()">Cancel</button>
                    <button onclick="saveEdit()">Save</button>
                </div>
            </div>
        </div>
    
</div>

<script src="config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script>

let currentEditId = null;
let adminsData = [];

async function loadAdmins() {
    const res = await fetch(window.apiUrl('/api/getAdmins'));
    const data = await res.json();

    if (!data.success) return;
    
    adminsData = data.admins;

    const table = document.getElementById('adminTable');

    // ลบข้อมูลเก่า
    table.innerHTML = `
        <tr>
            <th>No.</th>
            <th>Username</th>
            <th>Email</th>
            <th>Password</th>
            <th>Edit</th>
            <th>Delete</th>
        </tr>
    `;

    data.admins.forEach((admin, index) => {

        table.innerHTML += `
            <tr>
                <td>${index + 1}</td>
                <td>${admin.username}</td>
                <td>${admin.email}</td>
                <td>${admin.password}</td>
                <td>
                    <button onclick="editAdmin('${admin.id}')">✏️</button>
                </td>
                <td>
                    <button onclick="deleteAdmin(${admin.id})">🗑️</button>
                </td>
            </tr>
        `;
    });
}


async function deleteAdmin(id) {

    if (!confirm("ต้องการลบจริงไหม?")) return;

    const res = await fetch(window.apiUrl('/api/deleteAdmin/' + id), {
        method: 'DELETE'
    });

    const data = await res.json();

    if (data.success) {
        alert("ลบสำเร็จ");
        loadAdmins();
    }
}

async function addAdmin() {

    const username = prompt("Username:");
    if (!username) return;

    const email = prompt("Email:");
    if (!email) return;

    const password = prompt("Password:");
    if (!password) return;

    const res = await fetch(window.apiUrl('/api/addAdmin'), {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json'
        },
        body: JSON.stringify({
            username,
            email,
            password
        })
    });

    const data = await res.json();

    if (data.success) {
        alert("เพิ่มสำเร็จ");
        loadAdmins();
    } else {
        alert(data.message || "เพิ่มไม่สำเร็จ");
    }
}

function editAdmin(id){

    const admin = adminsData.find(a => a.id === Number(id));

    if(!admin){
        alert("ไม่พบข้อมูล admin");
        return;
    }

    currentEditId = admin.id;

    document.getElementById("editUsername").value = admin.username;
    document.getElementById("editEmail").value = admin.email;
    document.getElementById("editPassword").value = admin.password;

    document.getElementById("editModal").style.display = "flex";

}



function closeModal(){

    document.getElementById("editModal").style.display = "none";

}



async function saveEdit(){

    const username = document.getElementById("editUsername").value;
    const email = document.getElementById("editEmail").value;
    const password = document.getElementById("editPassword").value;

    const res = await fetch(window.apiUrl('/api/updateAdmin/'+currentEditId),{

        method:'PUT',

        headers:{
            'Content-Type':'application/json'
        },

        body:JSON.stringify({
            username,
            email,
            password
        })

    });

    const data = await res.json();

    if(data.success){

        Swal.fire({
            icon: 'success',
            title: 'แก้ไขสำเร็จ',
            text: 'ข้อมูล Admin ถูกอัปเดตแล้ว',
            confirmButtonColor: '#2563eb'
        });

        closeModal();

        loadAdmins();

    }else{

        Swal.fire({
            icon: 'error',
            title: 'เกิดข้อผิดพลาด',
            text: 'ไม่สามารถแก้ไขข้อมูลได้'
        });

        
    }

}

function searchAdmin() {

    const input = document.getElementById("searchAdmin").value.toLowerCase();
    const rows = document.querySelectorAll("#adminTable tr");

    rows.forEach((row, index) => {

        if (index === 0) return;

        const username = row.children[1].textContent.toLowerCase();

        if (username.includes(input)) {
            row.style.display = "";
        } else {
            row.style.display = "none";
        }

    });
}
loadAdmins();


</script>

</body>
</html>
