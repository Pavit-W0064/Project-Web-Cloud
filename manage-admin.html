<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Dashboard</title>
<link rel="stylesheet" href="admin.css">
</head>

<body>

<div class="layout">

<!-- Sidebar -->
<div class="sidebar">
    <div class="logo"><img src ='KMUTNB_Logo.svg.png' alt="">ระบบหลังบ้าน</div>
    <a href="/dashboard.html">Dashboard</a>
    <a href="/manage-student.html">Manage Students</a>
    <a href="/manage-admin.html">Manage Admin</a>
    <a href="/manage-contact.html">Manage Contact</a>
    <a href="/admin.html">Logout</a>
</div>

<div class="main">
    <h2>List of Administrators</h2>

    <input type="text" id="searchAdmin" placeholder="Search username..." onkeyup="searchAdmin()">

    <button class="btn-add" onclick="openAddModal()">➕ Add Admin</button>

    <table class="admin-list" id="adminTable">
        <tr>
            <th>No.</th>
            <th>Username</th>
            <th>Email</th>
            <th>Password</th>
            <th>Edit</th>
            <th>Delete</th>
        </tr>
    </table>
</div>


<!-- EDIT MODAL -->
<div id="editModal" class="modal">
    <div class="modal-box">

        <h3>Edit Admin</h3>

        <label>Username</label>
        <input type="text" id="editUsername">

        <label>Email</label>
        <input type="text" id="editEmail">

        <label>Password</label>
        <input type="text" id="editPassword">

        <div class="modal-buttons">
            <button onclick="closeModal()">Cancel</button>
            <button onclick="saveEdit()">Save</button>
        </div>

    </div>
</div>


<!-- ADD MODAL -->
<div id="addModal" class="modal">
    <div class="modal-box">

        <h3>Add Admin</h3>

        <label>Username</label>
        <input type="text" id="addUsername">

        <label>Email</label>
        <input type="text" id="addEmail">

        <label>Password</label>
        <input type="text" id="addPassword">

        <div class="modal-buttons">
            <button onclick="closeAddModal()">Cancel</button>
            <button onclick="saveAddAdmin()">Add</button>
        </div>

    </div>
</div>

</div>


<script src="config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script>

let currentEditId = null;
let adminsData = [];


/* =========================
   LOAD ADMINS
========================= */

async function loadAdmins(){

    const res = await fetch(window.apiUrl('/api/getAdmins'));
    const data = await res.json();

    if(!data.success) return;

    adminsData = data.admins;

    const table = document.getElementById("adminTable");

    table.innerHTML = `
    <tr>
        <th>No.</th>
        <th>Username</th>
        <th>Email</th>
        <th>Password</th>
        <th>Edit</th>
        <th>Delete</th>
    </tr>
    `;

    data.admins.forEach((admin,index)=>{

        table.innerHTML += `
        <tr>
            <td>${index+1}</td>
            <td>${admin.username}</td>
            <td>${admin.email}</td>
            <td>${admin.password}</td>

            <td>
                <button onclick="editAdmin(${admin.id})">✏️</button>
            </td>

            <td>
                <button onclick="deleteAdmin(${admin.id})">🗑️</button>
            </td>
        </tr>
        `;

    });

}



/* =========================
   DELETE ADMIN
========================= */

async function deleteAdmin(id){

    const confirm = await Swal.fire({
        title:'Delete Admin?',
        text:'ต้องการลบ Admin นี้หรือไม่',
        icon:'warning',
        showCancelButton:true,
        confirmButtonText:'Delete',
        confirmButtonColor:'#d33'
    });

    if(!confirm.isConfirmed) return;

    const res = await fetch(window.apiUrl('/api/deleteAdmin/'+id),{
        method:'DELETE'
    });

    const data = await res.json();

    if(data.success){

        Swal.fire('Deleted!','ลบสำเร็จ','success');

        loadAdmins();
    }

}



/* =========================
   ADD ADMIN
========================= */

function openAddModal(){

    document.getElementById("addModal").style.display="flex";

    document.getElementById("addUsername").value="";
    document.getElementById("addEmail").value="";
    document.getElementById("addPassword").value="";

}

function closeAddModal(){

    document.getElementById("addModal").style.display="none";

}

async function saveAddAdmin(){

    const username=document.getElementById("addUsername").value.trim();
    const email=document.getElementById("addEmail").value.trim();
    const password=document.getElementById("addPassword").value.trim();

    if(!username || !email || !password){

        Swal.fire({
            icon:'warning',
            title:'กรอกข้อมูลให้ครบ'
        });

        return;
    }

    const res = await fetch(window.apiUrl('/api/addAdmin'),{

        method:'POST',

        headers:{
            'Content-Type':'application/json'
        },

        body:JSON.stringify({
            username,
            email,
            password
        })

    });

    const data = await res.json();

    if(data.success){

        Swal.fire({
            icon:'success',
            title:'เพิ่ม Admin สำเร็จ'
        });

        closeAddModal();
        loadAdmins();

    }else{

        Swal.fire({
            icon:'error',
            title:'เพิ่มไม่สำเร็จ',
            text:data.message
        });

    }

}



/* =========================
   EDIT ADMIN
========================= */

function editAdmin(id){

    const admin = adminsData.find(a => a.id === id);

    if(!admin){
        alert("ไม่พบข้อมูล");
        return;
    }

    currentEditId = admin.id;

    document.getElementById("editUsername").value = admin.username;
    document.getElementById("editEmail").value = admin.email;
    document.getElementById("editPassword").value = admin.password;

    document.getElementById("editModal").style.display="flex";

}

function closeModal(){

    document.getElementById("editModal").style.display="none";

}



async function saveEdit(){

    const username=document.getElementById("editUsername").value;
    const email=document.getElementById("editEmail").value;
    const password=document.getElementById("editPassword").value;

    const res = await fetch(window.apiUrl('/api/updateAdmin/'+currentEditId),{

        method:'PUT',

        headers:{
            'Content-Type':'application/json'
        },

        body:JSON.stringify({
            username,
            email,
            password
        })

    });

    const data = await res.json();

    if(data.success){

        Swal.fire({
            icon:'success',
            title:'แก้ไขสำเร็จ'
        });

        closeModal();
        loadAdmins();

    }else{

        Swal.fire({
            icon:'error',
            title:'แก้ไขไม่สำเร็จ'
        });

    }

}



/* =========================
   SEARCH ADMIN
========================= */

function searchAdmin(){

    const input = document.getElementById("searchAdmin").value.toLowerCase();

    const rows = document.querySelectorAll("#adminTable tr");

    rows.forEach((row,index)=>{

        if(index===0) return;

        const username = row.children[1].textContent.toLowerCase();

        row.style.display = username.includes(input) ? "" : "none";

    });

}


loadAdmins();

</script>

</body>
</html>
